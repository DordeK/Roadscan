<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00E676" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)" rx="200"/>

  <!-- Clipped content -->
  <g clip-path="url(#roundedClip)">

    <!-- Road trapezoid: narrow at top (horizon), wide at bottom -->
    <polygon points="370,310 654,310 820,820 204,820" fill="url(#roadGrad)"/>

    <!-- Road shoulder lines -->
    <line x1="370" y1="310" x2="204" y2="820" stroke="#383838" stroke-width="5"/>
    <line x1="654" y1="310" x2="820" y2="820" stroke="#383838" stroke-width="5"/>

    <!-- Center lane dashes (perspective-scaled) -->
    <line x1="512" y1="330" x2="512" y2="368" stroke="#4A4A4A" stroke-width="10" stroke-linecap="round"/>
    <line x1="511" y1="398" x2="509" y2="450" stroke="#4A4A4A" stroke-width="13" stroke-linecap="round"/>
    <line x1="508" y1="490" x2="505" y2="558" stroke="#4A4A4A" stroke-width="17" stroke-linecap="round"/>
    <line x1="504" y1="610" x2="500" y2="698" stroke="#4A4A4A" stroke-width="22" stroke-linecap="round"/>
    <line x1="499" y1="755" x2="495" y2="810" stroke="#4A4A4A" stroke-width="26" stroke-linecap="round"/>

    <!-- Horizon sky gradient strip -->
    <rect x="0" y="0" width="1024" height="320" fill="#0A0A0A"/>

    <!-- Horizon line -->
    <line x1="0" y1="310" x2="1024" y2="310" stroke="#232323" stroke-width="2"/>

    <!-- THE CLEAN ROAD LINE: smooth green path flowing down the center of the road -->
    <!-- Glowing backdrop -->
    <path d="M 512,318 C 512,380 511,440 510,510 C 509,590 507,660 504,740 C 502,780 499,810 496,830"
          fill="none" stroke="#00E676" stroke-width="24" stroke-linecap="round"
          opacity="0.18" filter="url(#softglow)"/>
    <!-- Main line -->
    <path d="M 512,318 C 512,380 511,440 510,510 C 509,590 507,660 504,740 C 502,780 499,810 496,830"
          fill="none" stroke="url(#greenLine)" stroke-width="10" stroke-linecap="round"
          filter="url(#glow)"/>

    <!-- Scan circle at the vanishing point (horizon) -->
    <circle cx="512" cy="310" r="38" fill="none" stroke="#00E676" stroke-width="5" opacity="0.9" filter="url(#glow)"/>
    <circle cx="512" cy="310" r="10" fill="#00E676" opacity="1" filter="url(#glow)"/>
    <!-- Outer pulse ring -->
    <circle cx="512" cy="310" r="58" fill="none" stroke="#00E676" stroke-width="2" opacity="0.35"/>

    <!-- Small tick / checkmark at bottom of road to imply "all clear" -->
    <polyline points="472,756 494,782 548,718"
              fill="none" stroke="#00E676" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"
              opacity="0.9" filter="url(#glow)"/>

  </g>
</svg>
